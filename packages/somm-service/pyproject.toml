[project]
name = "somm-service"
version = "0.1.0.dev0"
description = "somm service — web admin, HTTP API, background workers"
requires-python = ">=3.12"
dependencies = [
    "somm-core",
    "starlette>=0.40",
    "uvicorn>=0.30",
]

[project.scripts]
somm-serve = "somm_service.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/somm_service"]
